        }
        .page.active { display:block; }

        .question { font-size:19px; font-weight:600; line-height:1.45; margin-bottom:24px; text-align:center; }

        .progress-container { margin-bottom:28px; text-align:center; }
        .progress-bar { height:8px; background:#e2e8f0; border-radius:4px; overflow:hidden; margin-bottom:8px; }
        .progress-fill { height:100%; background:#3b82f6; width:0%; transition:width 0.4s ease; }
        .progress-text { font-size:15px; color:#64748b; }

        /* 选项按钮 & 上一题按钮 */
        .option, .nav-btn {
            width:100%; padding:18px 22px; margin:10px 0; border:2px solid #e2e8f0; border-radius:14px;
            background:white; font-size:16.5px; text-align:left; cursor:pointer; transition:all 0.25s;
            display:flex; align-items:flex-start; gap:12px; line-height:1.5;
        }
        .option:hover, .option:active, .nav-btn:hover, .nav-btn:active {
            border-color:#3b82f6;
            background:#eff6ff;
        }
        .option strong, .nav-btn strong { color:#3b82f6; font-weight:700; min-width:26px; }

        #back {
            width: auto;
            padding: 12px 24px;
            margin: 0;
            font-size: 16px;
        }

        /* 排序题 */
        .rank-list { list-style:none; padding:0; }
        .rank-item {
            display:flex; align-items:center; justify-content:space-between;
            background:#f8fafc; border:2px solid #e2e8f0; border-radius:14px;
            padding:16px 20px; margin:10px 0; font-size:16.5px;
        }
        .rank-item:hover { border-color:#3b82f6; background:#eff6ff; }
        .rank-number { font-weight:700; color:#3b82f6; margin-right:12px; width:28px; }
        .rank-text { flex:1; }
        .rank-buttons { display:flex; gap:8px; }
        .rank-btn {
            padding:8px 14px; font-size:14px; background:white; border:1px solid #cbd5e1;
            border-radius:8px; cursor:pointer;
        }

        #chart-container { width:100%; height:460px; margin:30px 0 25px 0; position:relative; }

        /* 最像谁区域 */
        #match-section { 
            margin-top:30px; padding:25px; background:#f8fafc; border-radius:16px; 
            text-align:center; border:1px solid #e2e8f0; 
        }
        #match-section img { 
            width:220px; height:220px; object-fit:cover; border-radius:14px; margin:15px 0; 
            box-shadow:0 6px 20px rgba(0,0,0,0.12); 
        }
        #match-section .english-quote {
            font-style: italic;
            color: #475569;
            font-size: 15.5px;
            margin-bottom: 8px;
        }
        #match-section .chinese-desc {
            font-size: 17.5px;
            font-weight: 700;
            color: #1e40af;
            margin-top: 4px;
        }

        /* 定义区域 */
        #dimension-list {
            margin-top: 25px;
            padding: 22px;
            background: #f8fafc;
            border-radius: 16px;
            border: 1px solid #e2e8f0;
            font-size: 15.2px;
            line-height: 1.75;
        }
        #dimension-list .notice {
            font-size: 14px;
            color: #e11d48;
            margin-bottom: 18px;
            font-weight: 500;
        }
        #dimension-list div {
            margin-bottom: 16px;
        }
        #dimension-list strong {
            color: #1e2937;
            font-weight: 700;
        }

        @media (max-width: 768px) {
            body { padding: 12px 8px; }
            .page { padding: 28px 20px; border-radius: 18px; }
            .question#result-name { font-size: 26px !important; margin-bottom: 12px !important; }

            .question { font-size: 18.5px !important; }
            .option, .nav-btn { font-size: 16.5px; padding: 17px 18px; }
            .rank-item { padding: 15px 18px; font-size: 16px; }

// 第17题 排序题
{q:"你觉得你在创作Beatbox中，什么最重要？请按重要程度排序（从最重要到最不重要）",type:"rank",opts:[
{t:"技巧难度",dim:2},
{t:"音乐旋律",dim:4},
{t:"节奏律动",dim:3},
{t:"编排结构",dim:6},
{t:"原创创新",dim:5}
]}
];

let current = 0;
let answers = [];
let rawScores = Array(10).fill(0);
let displayScores = Array(10).fill(0);
let currentRankOrder = [];

// ==================== 页面函数 ====================
function showPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

function updateProgress() {
    const total = questions.length || 17;
    const percent = Math.round(((current + 1) / total) * 100);
    document.getElementById('progress-fill').style.width = percent + '%';
    document.getElementById('progress-text').innerText = `第 ${current + 1} / ${total} 题`;
}

function startTest() {
    current = 0;
    answers = Array(questions.length || 17).fill(null);
    rawScores = Array(10).fill(0);
    displayScores = Array(10).fill(0);
    currentRankOrder = [];
    showPage('page-test');
    loadQuestion();
}

function loadQuestion() {
    const q = questions[current];
    document.getElementById('question-text').innerText = `第${current+1}题：${q.q}`;
    const box = document.getElementById('options-box');
    box.innerHTML = '';

    updateProgress();
    document.getElementById('back').style.display = current > 0 ? 'block' : 'none';
    document.getElementById('finish').style.display = (current === questions.length - 1) ? 'block' : 'none';

    if (!q.type) {
        const letters = ['A','B','C','D'];
        q.opts.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'option';
            btn.innerHTML = `<strong>${letters[i]}.</strong> ${opt.t}`;
            btn.onclick = () => {
                answers[current] = i;
                if (current < questions.length - 1) {
                    current++;
                    loadQuestion();
                }
            };
            box.appendChild(btn);
        });
    } else {
        const rankList = document.createElement('ul');
        rankList.className = 'rank-list';
        currentRankOrder = q.opts.map((_, i) => i);
        renderRankItemsNew(rankList, q.opts);
        box.appendChild(rankList);
        answers[current] = [...currentRankOrder];
    }
}

function renderRankItemsNew(listElement, opts) {
    listElement.innerHTML = '';
    currentRankOrder.forEach((origIndex, pos) => {
        const item = opts[origIndex];
        const li = document.createElement('li');
        li.className = 'rank-item';
        li.draggable = true;
        li.innerHTML = `
            <span class="rank-number">${pos + 1}.</span>
            <span class="rank-text">${item.t}</span>
            <div class="rank-buttons">
                <button class="rank-btn" onclick="moveUp(${pos}); event.stopImmediatePropagation();">↑ 上移</button>
                <button class="rank-btn" onclick="moveDown(${pos}); event.stopImmediatePropagation();">↓ 下移</button>
            </div>
        `;
        li.addEventListener('dragstart', e => e.dataTransfer.setData('text/plain', pos));
        li.addEventListener('dragover', e => e.preventDefault());
        li.addEventListener('drop', e => {
            e.preventDefault();
            const from = parseInt(e.dataTransfer.getData('text/plain'));
            moveItem(from, pos);
        });
        listElement.appendChild(li);
    });
}

window.moveUp = function(pos) {
    if (pos <= 0) return;
    [currentRankOrder[pos], currentRankOrder[pos-1]] = [currentRankOrder[pos-1], currentRankOrder[pos]];
    answers[questions.length-1] = [...currentRankOrder];
    renderRankItemsNew(document.querySelector('.rank-list'), questions[questions.length-1].opts);
};

window.moveDown = function(pos) {
    if (pos >= currentRankOrder.length - 1) return;
    [currentRankOrder[pos], currentRankOrder[pos+1]] = [currentRankOrder[pos+1], currentRankOrder[pos]];
    answers[questions.length-1] = [...currentRankOrder];
    renderRankItemsNew(document.querySelector('.rank-list'), questions[questions.length-1].opts);
};

function moveItem(from, to) {
    if (from === to) return;
    const moved = currentRankOrder.splice(from, 1)[0];
    currentRankOrder.splice(to, 0, moved);
    answers[questions.length-1] = [...currentRankOrder];
    renderRankItemsNew(document.querySelector('.rank-list'), questions[questions.length-1].opts);
}

function goBack() {
    if (current > 0) { current--; loadQuestion(); }
}

function calcAll() {
    rawScores.fill(0);
    questions.forEach((q, i) => {
        const ans = answers[i];
        if (ans === null) return;
        if (!q.type) {
            const s = q.opts[ans].s;
            for (let d = 0; d < 10; d++) rawScores[d] += s[d];
        } else {
            const scoreAdd = [4, 3, 2, 1, 0];
            ans.forEach((origIndex, rank) => {
                const dimIndex = q.opts[origIndex].dim - 1;
                if (dimIndex >= 0 && dimIndex < 10) rawScores[dimIndex] += scoreAdd[rank];
            });
        }
    });

    displayScores = rawScores.map((score, i) => {
        const max = MAX_SCORES[i] || 30;
        return max > 0 ? Math.round((score / max) * 60) : 0;
    });
}

function showResult() {
    if (answers[answers.length - 1] === null) answers[answers.length - 1] = [...currentRankOrder];
    calcAll();
    showPage('page-result');

    const ctx = document.getElementById('radarChart').getContext('2d');
    new Chart(ctx, {
        type: 'radar',
        data: {
            labels: DIM_NAMES,
            datasets: [{ 
                data: displayScores,
                backgroundColor: 'rgba(59,130,246,0.25)',
                borderColor: '#3b82f6',
                borderWidth: 3,
                pointBackgroundColor: '#3b82f6',
                pointBorderColor: '#3b82f6',
                pointRadius: 6
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: { r: { min: 0, max: 50, ticks: { display: false } } },
            pointLabels: { font: { size: 18, weight: 'bold' }, color: '#1e2937', padding: 15 },
            plugins: { legend: { display: false } }
        }
    });

    renderDimensionList();
    renderMatchSection();
}

// 定义区域 - 最上方加注意提示
function renderDimensionList() {
    const container = document.getElementById('dimension-list');
    let html = `
        <div class="notice">注意：雷达图仅代表你测出来的结果，不是说对应Beatboxer是这个能力值分布</div>
    `;
    DIM_NAMES.forEach((dim) => {
        html += `<div><strong>${dim}：</strong>${DIM_DESCRIPTIONS[dim]}</div>`;
    });
    container.innerHTML = html;
}

function renderMatchSection() {
    const container = document.getElementById('match-section');
    container.innerHTML = '';

    const first16 = answers.slice(0, 16);
    const isEasterEgg = first16.length === 16 && first16.every(a => a !== null) && new Set(first16).size === 1;

    let best;
    if (isEasterEgg) {
        best = BBXR_DATA.find(b => b.name === "东莞阿豪") || BBXR_DATA[0];
        best.similarity = 100;
    } else {
        const scoredList = BBXR_DATA.map(bbxr => {
            let dot = 0, uMag = 0, bMag = 0;
            for (let i = 0; i < 10; i++) {
                dot += rawScores[i] * bbxr.scores[i];
                uMag += rawScores[i] ** 2;
                bMag += bbxr.scores[i] ** 2;
            }
            const cosine = (uMag && bMag) ? dot / (Math.sqrt(uMag) * Math.sqrt(bMag)) : 0;
            return { ...bbxr, similarity: Math.round(cosine * 100) };
        });
        best = scoredList.sort((a, b) => b.similarity - a.similarity)[0];
    }

    let chineseDesc = best.desc;
    if (best.desc.includes('<br>')) {
        chineseDesc = best.desc.split('<br>')[1] || best.desc;
    } else if (best.desc.includes('</i>')) {
        chineseDesc = best.desc.replace(/<i>.*?<\/i>/, '').trim();
    }

    container.innerHTML = `
        <h3 style="margin:0 0 15px 0; color:#3b82f6;">你最像 <strong>${best.name}</strong> （${best.similarity}% 相似）</h3>
        <img src="${best.img}" alt="${best.name}">
        <p class="english-quote">${best.desc.includes('<i>') ? best.desc.match(/<i>(.*?)<\/i>/)[1] : `"${best.desc}"`}</p>
        <p class="chinese-desc">${chineseDesc}</p>
    `;
}
</script>
